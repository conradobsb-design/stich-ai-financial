<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extrato Co. - Painel Financeiro Premium</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CDN Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#0ea5e9", // Sky 500
              "secondary": "#38bdf8", // Sky 400
              "tertiary": "#818cf8", // Indigo 400
              "background": "#020617", // Deep Navy
              "surface": "#0f172a", // Navy Surface
              "surface-container-low": "#1e293b",
              "surface-container": "#334155",
              "surface-container-high": "#475569",
              "on-surface": "#f8fafc",
              "on-surface-variant": "#94a3b8",
              "outline-variant": "rgba(148, 163, 184, 0.1)",
              "primary-container": "rgba(14, 165, 233, 0.15)",
              "secondary-container": "rgba(56, 189, 248, 0.1)",
              "error": "#ef4444",
              "success": "#10b981",
              "accent": "#00d2ff",
              "nubank": "#820AD1",
              "nubank-light": "#a855f7"
            },
            "fontFamily": {
              "headline": ["Inter"],
              "body": ["Inter"],
              "sans": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Custom Animations */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
  </head>
  <body class="bg-background text-on-surface selection:bg-primary/30">

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
