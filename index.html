<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Extrato Co." />
    <meta name="theme-color" content="#020617" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Extrato Co. — Painel Financeiro Corporativo</title>
    <meta name="description" content="Importe extratos bancários e visualize tudo em um painel limpo, compartilhável e seguro. Sem planilhas."/>
    <meta name="robots" content="index,follow"/>

    <!-- Open Graph -->
    <meta property="og:site_name" content="Extrato Co."/>
    <meta property="og:type"      content="website"/>
    <meta property="og:title"     content="Extrato Co. — Painel Financeiro Corporativo"/>
    <meta property="og:description" content="Importe extratos bancários e visualize tudo em um painel limpo, compartilhável e seguro. Sem planilhas."/>
    <meta property="og:image"     content="https://extratobancario.cortezgroup.com.br/og.png"/>
    <meta property="og:url"       content="https://extratobancario.cortezgroup.com.br"/>

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image"/>
    <meta name="twitter:title"       content="Extrato Co. — Painel Financeiro Corporativo"/>
    <meta name="twitter:description" content="Importe extratos bancários e visualize tudo em um painel limpo, compartilhável e seguro. Sem planilhas."/>
    <meta name="twitter:image"       content="https://extratobancario.cortezgroup.com.br/og.png"/>

    <!-- Canonical -->
    <link rel="canonical" href="https://extratobancario.cortezgroup.com.br"/>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CDN Config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "var(--color-primary, #0ea5e9)",
              "primary-light": "var(--color-primary-light, #38bdf8)",
              "secondary": "var(--color-secondary, #38bdf8)",
              "tertiary": "var(--color-tertiary, #818cf8)",
              "background": "var(--color-background, #020617)",
              "surface": "var(--color-surface, #0f172a)",
              "surface-container-low": "var(--color-surface-low, #1e293b)",
              "surface-container": "var(--color-surface-mid, #334155)",
              "surface-container-high": "var(--color-surface-high, #475569)",
              "on-surface": "#f8fafc",
              "on-surface-variant": "#94a3b8",
              "outline-variant": "rgba(148, 163, 184, 0.1)",
              "primary-container": "var(--color-primary-container, rgba(14,165,233,0.15))",
              "error": "#ef4444",
              "success": "var(--color-success, #10b981)",
              "accent": "var(--color-accent, #00d2ff)",
              "nubank": "#820AD1",
              "nubank-light": "#a855f7"
            },
            "fontFamily": {
              "headline": ["Inter"],
              "body": ["Inter"],
              "sans": ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Custom Animations */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
  </head>
  <body class="bg-background text-on-surface selection:bg-primary/30">

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
